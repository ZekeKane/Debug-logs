<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS Tetris</title>
    <style>
        body {
            background: #202028;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 10px;
            overscroll-behavior-y: contain; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 92vh; /* Use screen height to pin controls to the bottom */
        }
        .header {
            flex-shrink: 0;
        }
        .title {
            font-size: 1.5rem;
            margin: 5px 0 0 0;
        }
        #score {
            font-size: 1.2rem;
            margin: 5px 0;
        }
        canvas {
            border: solid 2px #fff;
            background-color: #000;
            display: block;
            margin: 0 auto;
            max-height: 45vh;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        
        /* Console-Style Split Controls Layout */
        .controls-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            max-width: 450px;
            margin: 0 auto cubic-bezier(0.1, 0.7, 1.0, 0.1);
            padding-bottom: 20px;
            user-select: none;
        }

        /* Left Side: Movement D-Pad */
        .dpad-side {
            display: flex;
            gap: 8px;
        }

        /* Right Side: Action Cluster */
        .action-side {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        /* Universal Button Styling */
        .btn {
            background: #3a3a4a;
            color: white;
            border: none;
            font-weight: bold;
            border-radius: 12px;
            touch-action: none; 
            box-shadow: 0 5px #1a1a24;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.05s;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px #1a1a24;
            background: #4e4e64;
        }

        /* Specific Button Sizes & Colors */
        .btn-dir {
            width: 65px;
            height: 65px;
            font-size: 1.5rem;
            background: #2e2e3a;
        }
        .btn-action {
            width: 70px;
            height: 60px;
            font-size: 1rem;
        }
        .btn-rotate {
            background: #0DC2FF;
            color: #000;
            grid-column: span 2; /* Stretch rotate across the top of the actions */
            height: 55px;
            font-size: 1.1rem;
        }
        .btn-rotate:active { background: #009ecf; }
        
        .btn-drop { background: #FF0D72; font-size: 1.2rem; }
        .btn-drop:active { background: #cc0a5b; }
        
        .btn-hard-drop { background: #FFE138; color: #000; font-size: 1.2rem; }
        .btn-hard-drop:active { background: #cca500; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Tetris</div>
        <div id="score">Score: 0</div>
    </div>

    <canvas id="tetris" width="240" height="400"></canvas>

    <div class="controls-container">
        <div class="dpad-side">
            <button class="btn btn-dir" id="move-left">◀</button>
            <button class="btn btn-dir" id="move-right">▶</button>
        </div>
        
        <div class="action-side">
            <button class="btn btn-action btn-rotate" id="rotate">↻ ROTATE</button>
            <button class="btn btn-action btn-drop" id="drop-down">▼</button>
            <button class="btn btn-action btn-hard-drop" id="hard-drop">⚡</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');

        context.scale(20, 20);

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] &&
                        arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function createPiece(type) {
            if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
            if (type === 'O') return [[2, 2], [2, 2]];
            if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
            if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        const colors = [
            null, '#FF0D72', '#0DC2FF', '#0DFF72',
            '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'
        ];

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            while (!collide(arena, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            document.getElementById('score').innerText = 'Score: ' + player.score;
        }

        const arena = createMatrix(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        // Desktop Keyboard Support
        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 32) playerHardDrop();
            else if (event.keyCode === 38 || event.keyCode === 87 || event.keyCode === 81) playerRotate(1);
        });

        // REUSABLE CONTINUOUS HOLD ENGINE 
        let actionIntervalId = null;

        function startContinuousAction(actionFunction, speedMs, e) {
            if(e) e.preventDefault();
            actionFunction(); 
            
            if (!actionIntervalId) {
                actionIntervalId = setInterval(actionFunction, speedMs); 
            }
        }

        function stopContinuousAction(e) {
            if(e) e.preventDefault();
            if (actionIntervalId) {
                clearInterval(actionIntervalId);
                actionIntervalId = null;
            }
        }

        const leftBtn = document.getElementById('move-left');
        const rightBtn = document.getElementById('move-right');
        const softDropBtn = document.getElementById('drop-down');

        // Left hold engine
        leftBtn.addEventListener('touchstart', (e) => startContinuousAction(() => playerMove(-1), 100, e));
        leftBtn.addEventListener('touchend', stopContinuousAction);
        leftBtn.addEventListener('touchcancel', stopContinuousAction);

        // Right hold engine
        rightBtn.addEventListener('touchstart', (e) => startContinuousAction(() => playerMove(1), 100, e));
        rightBtn.addEventListener('touchend', stopContinuousAction);
        rightBtn.addEventListener('touchcancel', stopContinuousAction);

        // Soft Drop hold engine
        softDropBtn.addEventListener('touchstart', (e) => startContinuousAction(playerDrop, 80, e));
        softDropBtn.addEventListener('touchend', stopContinuousAction);
        softDropBtn.addEventListener('touchcancel', stopContinuousAction);

        // Desktop fallbacks
        leftBtn.addEventListener('mousedown', (e) => startContinuousAction(() => playerMove(-1), 100, null));
        rightBtn.addEventListener('mousedown', (e) => startContinuousAction(() => playerMove(1), 100, null));
        softDropBtn.addEventListener('mousedown', (e) => startContinuousAction(playerDrop, 80, null));
        window.addEventListener('mouseup', stopContinuousAction);

        // Standard single tap elements
        document.getElementById('hard-drop').addEventListener('touchstart', (e) => { e.preventDefault(); playerHardDrop(); });
        document.getElementById('rotate').addEventListener('touchstart', (e) => { e.preventDefault(); playerRotate(1); });

        document.getElementById('hard-drop').addEventListener('click', () => playerHardDrop());
        document.getElementById('rotate').addEventListener('click', () => playerRotate(1));

        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
